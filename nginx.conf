# Nginx Server Configuration for nomadtrekkers.org

# HTTP - Redirect all traffic to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name nomadtrekkers.org www.nomadtrekkers.org;

    # Certbot ACME challenge directory
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect all HTTP requests to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS - Production Web Server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name nomadtrekkers.org www.nomadtrekkers.org;

    # Maximum file upload size (5MB+)
    client_max_body_size 10M;

    # Enable Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss image/svg+xml;

    # Application Reverse Proxy proxying to PM2 on port 3005
    location / {
        proxy_pass http://127.0.0.1:3005;
        proxy_http_version 1.1;
        
        # Proper headers for IP tracking and security
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSockets support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Static Assets Caching Optimization (Vite assets folder)
    location ~* ^/assets/ {
        proxy_pass http://127.0.0.1:3005;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        
        # Cache static files aggressively
        expires 1y;
        add_header Cache-Control "public, no-transform, immutable";
        access_log off;
    }

    # Uploaded images Caching Optimization
    location ~* ^/uploads/ {
        proxy_pass http://127.0.0.1:3005;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        
        expires 1m;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }
}
