version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: forttracker_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: forttracker
      MYSQL_USER: fortuser
      MYSQL_PASSWORD: fortpass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password
    
  phpmyadmin:
    image: phpmyadmin
    container_name: forttracker_phpmyadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: password
    depends_on:
      - mysql

volumes:
  mysql_data:
